<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script type="text/javascript" src="/assets/js/dark-mode.js"></script>
    {% include favico.html %}
    {% include link-static.html %}
    <link rel="stylesheet" href="{{ '/assets/css/default.css' | relative_url }}">
    <title>Albawid | {{ page.title }}</title>
  </head>
  <body>
    <div class="loading-screen" id="loading-screen">
      <div class="loading-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
    <script>
      (function () {
        var start = Date.now();
        var minTime = 1500;
        window.addEventListener('load', function () {
          var elapsed = Date.now() - start;
          var wait = Math.max(0, minTime - elapsed);
          setTimeout(function () {
            var ls = document.getElementById('loading-screen');
            ls.classList.add('fade-out');
            setTimeout(function () { ls.remove(); }, 300);
          }, wait);
        });
      })();
    </script>
    <button onclick="fungsi()" id="btn-dark">dark mode</button>
    {% include navbar.html %}
    <div class="container">
        {{ content }}
    </div>
    {% include footer.html %}
    {% include lightbox.html %}
    <script src="/assets/js/copy-code.js"></script>
  </body>
</html>
